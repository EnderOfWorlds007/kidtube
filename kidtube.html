<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f0f0f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<link rel="manifest" href="./manifest.json" />
<title>YouTube</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #272727;
    --elevated: #181818;
    --border: #303030;
    --text-primary: #ffffff;
    --text-secondary: #aaaaaa;
    --text-tertiary: #717171;
    --accent-red: #ff0000;
    --accent-blue: #3ea6ff;
    --chip-active-bg: #ffffff;
    --chip-active-text: #0f0f0f;
    --chip-bg: #272727;
    --chip-text: #ffffff;
    --search-bg: #121212;
    --search-border: #303030;
    --search-btn-bg: #222222;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-full: 9999px;
    --header-height: 56px;
    --allow-color: #48bb78;
    --block-color: #fc8181;
    --constraint-color: #7c9bf5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Roboto', Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* Header */
  .header {
    background: var(--bg);
    height: var(--header-height);
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-logo {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .header-logo svg { height: 20px; }
  .header-search {
    flex: 1;
    display: flex;
    justify-content: center;
  }
  .header-search-inner {
    display: flex;
    max-width: 540px;
    width: 100%;
    align-items: center;
  }
  .search-input {
    flex: 1;
    background: var(--search-bg);
    border: 1px solid var(--search-border);
    border-right: none;
    border-radius: 20px 0 0 20px;
    padding: 8px 16px;
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
    font-family: inherit;
  }
  .search-input::placeholder { color: var(--text-tertiary); }
  .search-input:focus { border-color: #1c62b9; }
  .search-btn {
    background: var(--search-btn-bg);
    border: 1px solid var(--search-border);
    border-radius: 0 20px 20px 0;
    padding: 0 20px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .search-btn svg { fill: var(--text-primary); }
  .mic-btn {
    background: var(--elevated);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-left: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .mic-btn svg { fill: var(--text-primary); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4285f4, #34a853);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 14px;
    font-weight: 500;
  }
  .search-icon-btn {
    display: none;
    background: none;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .search-icon-btn svg { fill: var(--text-primary); }
  .mobile-search-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-height);
    background: var(--bg);
    z-index: 150;
    padding: 8px;
    align-items: center;
    gap: 8px;
  }
  .mobile-search-overlay.active { display: flex; }
  .mobile-search-back {
    background: none;
    border: none;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .mobile-search-back svg { fill: var(--text-primary); }

  /* Category Chips */
  .chips-bar {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .chips-bar::-webkit-scrollbar { display: none; }
  .chip {
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  .chip.active {
    background: var(--chip-active-bg);
    color: var(--chip-active-text);
  }
  .chip:not(.active) {
    background: var(--chip-bg);
    color: var(--chip-text);
  }
  .chip:not(.active):hover { background: #3d3d3d; }

  /* Main */
  main { padding: 16px; max-width: 1284px; margin: 0 auto; }

  /* Video Grid */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .video-card { cursor: pointer; }
  .video-card:hover .video-title { color: var(--text-primary); }
  .thumb-wrap {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .thumb-wrap img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: var(--surface);
  }
  .duration-badge {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .video-meta {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .channel-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    flex-shrink: 0;
  }
  .video-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text-primary);
  }
  .video-channel {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .video-stats {
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* Search Results */
  .search-results {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .search-result {
    display: flex;
    gap: 16px;
    cursor: pointer;
  }
  .search-result .thumb-wrap {
    flex-shrink: 0;
    width: 360px;
  }
  .search-result-info {
    flex: 1;
    min-width: 0;
  }
  .search-result-title {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text-primary);
  }
  .search-result-stats {
    color: var(--text-secondary);
    font-size: 12px;
    margin-top: 6px;
  }
  .search-result-channel {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .search-result-channel .channel-avatar {
    width: 24px;
    height: 24px;
  }
  .search-result-channel span {
    color: var(--text-secondary);
    font-size: 12px;
  }
  .search-result-desc {
    color: var(--text-secondary);
    font-size: 12px;
    margin-top: 8px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Player Overlay */
  .player-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .player-container { width: 100%; max-width: 680px; }
  .player-close {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
  }
  .player-close-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .player-close-btn:hover { background: rgba(255,255,255,0.2); }
  .player-body {
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .player-body iframe,
  .player-body #yt-player-target {
    width: 100%;
    aspect-ratio: 16/9;
    display: block;
    border: none;
  }
  .player-info { padding: 16px; }
  .player-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text-primary);
  }
  .player-channel-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  .player-channel-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .player-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .player-badge {
    background: var(--surface);
    padding: 6px 14px;
    border-radius: var(--radius-full);
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 500;
  }
  .player-error {
    aspect-ratio: 16/9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    color: white;
    padding: 20px;
    text-align: center;
    gap: 16px;
  }
  .player-error a {
    padding: 10px 24px;
    background: var(--accent-red);
    color: white;
    border-radius: var(--radius-sm);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 20px;
  }
  .modal {
    background: var(--elevated);
    border-radius: var(--radius);
    padding: 32px;
    max-width: 540px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    color: var(--text-primary);
  }
  .modal h2 { font-size: 20px; font-weight: 600; }
  .modal .subtitle {
    color: var(--text-secondary);
    font-size: 13px;
    margin-top: 4px;
    margin-bottom: 24px;
  }
  .settings-tier { margin-bottom: 24px; }
  .settings-tier-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .settings-tier-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .settings-tier-title {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .settings-tier-hint {
    color: var(--text-tertiary);
    font-size: 11px;
  }
  .settings-tier-body {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .settings-label {
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .settings-input,
  .settings-textarea,
  .settings-select {
    width: 100%;
    background: var(--search-bg);
    border: 1px solid var(--search-border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .settings-textarea {
    resize: vertical;
    min-height: 60px;
  }
  .settings-input:focus,
  .settings-textarea:focus,
  .settings-select:focus {
    border-color: var(--accent-blue);
  }
  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .settings-row .settings-input { width: 80px; text-align: center; }
  .settings-btn-row {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .btn-cancel {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-full);
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-cancel:hover { background: var(--surface); }
  .btn-save {
    padding: 8px 20px;
    background: var(--accent-blue);
    border: none;
    border-radius: var(--radius-full);
    color: var(--bg);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-save:hover { opacity: 0.9; }

  /* PIN */
  .pin-prompt { text-align: center; }
  .pin-prompt input {
    max-width: 200px;
    margin: 16px auto;
    text-align: center;
    font-size: 24px;
    letter-spacing: 8px;
    background: var(--search-bg);
    border: 1px solid var(--search-border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    padding: 10px;
    outline: none;
    display: block;
  }
  .pin-prompt input:focus { border-color: var(--accent-blue); }
  .pin-error {
    color: var(--block-color);
    font-size: 13px;
    margin-top: 8px;
  }

  /* Setup */
  .setup-screen {
    max-width: 560px;
    margin: 80px auto;
    padding: 40px;
    background: var(--elevated);
    border-radius: var(--radius);
    text-align: center;
  }
  .setup-screen h2 { font-size: 24px; margin-bottom: 8px; }
  .setup-screen p { color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
  .setup-screen input {
    width: 100%;
    padding: 12px 16px;
    background: var(--search-bg);
    border: 1px solid var(--search-border);
    border-radius: 10px;
    font-size: 15px;
    color: var(--text-primary);
    outline: none;
    margin-bottom: 16px;
  }
  .setup-screen input:focus { border-color: var(--accent-blue); }
  .setup-screen .instructions {
    text-align: left;
    background: var(--bg);
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 24px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-secondary);
  }
  .setup-screen .instructions strong { color: var(--text-primary); }
  .setup-screen .instructions code {
    background: var(--surface);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--accent-blue);
  }
  .setup-screen .instructions ol { padding-left: 20px; }
  .setup-screen .instructions a { color: var(--accent-blue); }
  .btn-primary {
    padding: 12px 32px;
    background: var(--accent-blue);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-full);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Status */
  .status-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-size: 16px;
  }
  .status-msg .emoji { font-size: 48px; display: block; margin-bottom: 16px; }

  /* Language list */
  .lang-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .lang-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--search-bg);
    border: 1px solid var(--search-border);
    border-radius: 6px;
    padding: 6px 10px;
  }
  .lang-item-label {
    flex: 1;
    font-size: 13px;
    color: var(--text-primary);
  }
  .lang-item-priority {
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .lang-item button {
    background: none;
    border: none;
    color: var(--text-tertiary);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
  }
  .lang-item button:hover { color: var(--text-primary); }

  /* Loading spinner */
  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--surface);
    border-top-color: var(--text-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 1024px) {
    .video-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 768px) {
    .video-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .video-grid { grid-template-columns: 1fr; }
    .header-search { display: none; }
    .search-icon-btn { display: flex; }
    .search-result { flex-direction: column; }
    .search-result .thumb-wrap { width: 100%; }
    .modal { padding: 0; border-radius: 0; max-height: 100vh; height: 100vh; }
    .player-container { max-width: 100%; }
    .player-overlay { padding: 0; align-items: flex-start; }
    .player-close { position: absolute; top: 8px; right: 8px; z-index: 10; }
    .setup-screen { margin: 20px 16px; padding: 24px; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── API Base URL ─── */
// If a proxy URL is configured, API calls go through it (key stays server-side).
// Otherwise, calls go direct to Google (key stored in localStorage).
const DEFAULT_PROXY = 'https://kidtube-api.enderofworlds007.workers.dev';
const PROXY_URL = localStorage.getItem('kidtube_proxy') || DEFAULT_PROXY;
function ytApiUrl(path, params) {
  if (PROXY_URL) {
    // Proxy mode: key is server-side, remove it from params
    params.delete('key');
    return `${PROXY_URL}${path}?${params}`;
  }
  return `https://www.googleapis.com${path}?${params}`;
}

/* ─── Constants ─── */
const SETTINGS_VERSION = 2; // bump to push default changes to existing users
const DEFAULT_SETTINGS = {
  _v: SETTINGS_VERSION,
  apiKey: '',
  parentPin: '1234',
  maxDuration: 15,
  blockedKeywords: '',
  blockedChannels: '',
  allowedChannels: '',
  safeSearch: 'strict',
  languages: ['fr'],
  videosPerApproval: 1,
  useRssHomeFeed: true,
};

const TOPICS_BY_LANG = {
  en: ['Minecraft', 'Lego', 'Cartoons', 'Animals', 'Science', 'Drawing', 'Music', 'Sports', 'Baking', 'Nature'],
  fr: ['Minecraft', 'Lego', 'Dessins animés', 'Animaux', 'Science', 'Dessin', 'Musique', 'Ping Pong', 'Pâtisserie', 'Tennis'],
  es: ['Minecraft', 'Lego', 'Dibujos animados', 'Animales', 'Ciencia', 'Dibujo', 'Música', 'Deportes', 'Repostería', 'Naturaleza'],
  de: ['Minecraft', 'Lego', 'Zeichentrick', 'Tiere', 'Wissenschaft', 'Zeichnen', 'Musik', 'Sport', 'Backen', 'Natur'],
};

function getTopics(settings) {
  const lang = (settings.languages || [])[0] || 'en';
  return TOPICS_BY_LANG[lang] || TOPICS_BY_LANG.en;
}

/* ─── Curated channels for RSS home feed (channelId → topic index) ─── */
// Topic indices match TOPICS_BY_LANG: 0=Minecraft, 1=Lego, 2=Dessins animés,
// 3=Animaux, 4=Science, 5=Dessin, 6=Musique, 7=Ping Pong, 8=Pâtisserie, 9=Tennis
// All channel IDs verified with working RSS feeds.
const CURATED_CHANNELS = {
  fr: {
    // Minecraft (0) — no dedicated FR channel found, will fall back to API search
    // Lego (1)
    'UC1gOOzaT_nWDUURe6tjtsHA': 1, // Mr. Bricks en Français
    'UCwIejFZVc_QPBMMOIm5ObaQ': 1, // Lego Cooking
    'UCW6BEk2-Ve8SPl9NlVXqz6Q': 1, // MADABOUTLEGO
    'UClsFdM0HzTdF1JYoraQ0aUw': 1, // Brick Experiment Channel
    // Dessins animés (2)
    'UCo9j7fWproKYTos4_RY-LUw': 2, // Simon Super Lapin FR
    'UCwztOpzEE8X3xjD7CYFQyXg': 2, // Boxoffice KIDS
    'UC0pHdbHRCREJJQhGSUDH61g': 2, // Pocoyo FR
    'UCStiWhNWjHELyavdV4KhZYQ': 2, // 100% KIDZ
    'UCGfy_srryuYyqRJH7G2pk8w': 2, // Katuri FR
    // Animaux (3) — fall back to API

/* ─── RSS Feed Fetching (zero quota, proxied for CORS) ─── */
async function fetchRssFeed(channelId) {
  try {
    const rssUrl = PROXY_URL
      ? `${PROXY_URL}/rss?channel_id=${channelId}`
      : `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
    const resp = await fetch(rssUrl);
    if (!resp.ok) return [];
    const text = await resp.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');
    const entries = xml.querySelectorAll('entry');
    return Array.from(entries).map(entry => {
      const videoId = entry.querySelector('videoId')?.textContent ||
        (entry.querySelector('id')?.textContent || '').split(':').pop();
      const title = entry.querySelector('title')?.textContent || '';
      const published = entry.querySelector('published')?.textContent || '';
      const channelName = entry.querySelector('author > name')?.textContent || '';
      const mediaGroup = entry.getElementsByTagName('media:group')[0];
      const thumbnail = mediaGroup?.getElementsByTagName('media:thumbnail')[0]?.getAttribute('url') || '';
      const description = mediaGroup?.getElementsByTagName('media:description')[0]?.textContent || '';
      return { videoId, title, published, channelName, thumbnail, description };
    });
  } catch { return []; }
}

/* ─── oEmbed metadata (zero quota) ─── */
async function fetchOembed(videoId) {
  try {
    const resp = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
    if (!resp.ok) return null;
    return resp.json();
  } catch { return null; }
}

/* ─── Convert RSS entries to video objects matching our card format ─── */
function rssToVideoObj(rssEntry) {
  return {
    id: rssEntry.videoId,
    snippet: {
      title: rssEntry.title,
      channelTitle: rssEntry.channelName,
      publishedAt: rssEntry.published,
      description: rssEntry.description,
      thumbnails: {
        medium: { url: rssEntry.thumbnail || `https://i.ytimg.com/vi/${rssEntry.videoId}/mqdefault.jpg` },
        default: { url: `https://i.ytimg.com/vi/${rssEntry.videoId}/default.jpg` },
      },
    },
    statistics: {},
    durationSec: null, // RSS doesn't provide duration
    subscriberCount: null,
    _fromRss: true,
  };
}

/* ─── Fetch home feed via RSS from curated channels ─── */
async function fetchRssHomeFeed(settings) {
  const lang = (settings.languages || [])[0] || 'en';
  const channels = CURATED_CHANNELS[lang] || CURATED_CHANNELS.en;
  const channelIds = Object.keys(channels);

  // Fetch all channels in parallel
  const feeds = await Promise.allSettled(
    channelIds.map(id => fetchRssFeed(id))
  );

  const allVideos = [];
  for (let i = 0; i < feeds.length; i++) {
    if (feeds[i].status !== 'fulfilled') continue;
    const topicIdx = channels[channelIds[i]];
    for (const entry of feeds[i].value.slice(0, 5)) { // max 5 per channel
      const video = rssToVideoObj(entry);
      video._topicIdx = topicIdx;
      allVideos.push(video);
    }
  }

  // Apply text-based filters (can't filter by duration since RSS doesn't have it)
  const filtered = runFilterPipeline(
    allVideos.map(v => ({ ...v, durationSec: 0 })), // pass duration filter
    { ...settings, maxDuration: 9999 } // skip duration for RSS
  );

  return freshSort(filtered);
}

/* ─── Settings persistence ─── */
function loadSettings() {
  try {
    const raw = localStorage.getItem('kidtube_settings');
    if (!raw) return { ...DEFAULT_SETTINGS };
    const saved = JSON.parse(raw);
    // If settings are from an older version, apply new defaults for fields
    // that haven't been explicitly customized
    if ((saved._v || 0) < SETTINGS_VERSION) {
      const upgraded = { ...DEFAULT_SETTINGS, ...saved, _v: SETTINGS_VERSION };
      // Push specific default changes: language and duration
      if (!saved.languages || saved.languages.length === 0) upgraded.languages = DEFAULT_SETTINGS.languages;
      if (!saved.maxDuration || saved.maxDuration === 10) upgraded.maxDuration = DEFAULT_SETTINGS.maxDuration;
      if (saved.useRssHomeFeed === undefined) upgraded.useRssHomeFeed = DEFAULT_SETTINGS.useRssHomeFeed;
      saveSettings(upgraded);
      return upgraded;
    }
    return { ...DEFAULT_SETTINGS, ...saved };
  } catch { return { ...DEFAULT_SETTINGS }; }
}
function saveSettings(s) {
  localStorage.setItem('kidtube_settings', JSON.stringify(s));
}

/* ─── Watch history ─── */
/* ─── Watch history (rich) ─── */
// Stores: { videoId: { t: timestamp, ch: channelTitle, q: query, topic: topicName } }
function getWatchHistory() {
  try {
    const raw = JSON.parse(localStorage.getItem('kidtube_history') || '{}');
    // Migrate old format (videoId → timestamp) to new format
    const out = {};
    for (const [k, v] of Object.entries(raw)) {
      out[k] = typeof v === 'number' ? { t: v } : v;
    }
    return out;
  } catch { return {}; }
}
function markWatched(videoId, meta = {}) {
  const h = getWatchHistory();
  h[videoId] = { t: Date.now(), ...meta };
  // Keep last 500
  const entries = Object.entries(h).sort((a, b) => b[1].t - a[1].t).slice(0, 500);
  localStorage.setItem('kidtube_history', JSON.stringify(Object.fromEntries(entries)));
}
function isWatched(videoId) {
  return !!getWatchHistory()[videoId];
}

/* ─── Taste profile: extract signals from watch history ─── */
function getTasteProfile() {
  const h = getWatchHistory();
  const entries = Object.values(h);
  // Count channel watches
  const channelCounts = {};
  const queryCounts = {};
  const topicCounts = {};
  for (const e of entries) {
    if (e.ch) channelCounts[e.ch] = (channelCounts[e.ch] || 0) + 1;
    if (e.q) queryCounts[e.q] = (queryCounts[e.q] || 0) + 1;
    if (e.topic) topicCounts[e.topic] = (topicCounts[e.topic] || 0) + 1;
  }
  // Sort by frequency
  const topChannels = Object.entries(channelCounts).sort((a, b) => b[1] - a[1]).slice(0, 10).map(e => e[0]);
  const topQueries = Object.entries(queryCounts).sort((a, b) => b[1] - a[1]).slice(0, 10).map(e => e[0]);
  const topTopics = Object.entries(topicCounts).sort((a, b) => b[1] - a[1]).slice(0, 5).map(e => e[0]);
  return { topChannels, topQueries, topTopics, totalWatched: entries.length };
}

/* ─── Result freshness + taste-based boosting ─── */
function freshSort(videos) {
  const history = getWatchHistory();
  const taste = getTasteProfile();
  const favoriteChannels = new Set(taste.topChannels);

  // Score each video
  const scored = videos.map(v => {
    let score = 0;
    const wasWatched = !!history[v.id];
    // Unwatched videos get a big boost
    if (!wasWatched) score += 1000;
    // Videos from favorite channels get a boost
    if (favoriteChannels.has(v.snippet?.channelTitle)) score += 200;
    // Add randomness so results feel fresh
    score += Math.random() * 100;
    return { video: v, score, wasWatched };
  });

  scored.sort((a, b) => b.score - a.score);
  return scored.map(s => s.video);
}

/* ─── Duration helpers ─── */
function parseDuration(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0);
}
function fmtDuration(seconds) {
  const h = Math.floor(seconds/3600);
  const m = Math.floor((seconds%3600)/60);
  const s = seconds % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

/* ─── Number formatters ─── */
function fmtCount(n) {
  if (!n) return '';
  const num = parseInt(n);
  if (num >= 1_000_000) return (num / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (num >= 1_000) return (num / 1_000).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(num);
}
function fmtViews(n) {
  const c = fmtCount(n);
  return c ? c + ' views' : '';
}
function fmtSubscribers(n) {
  const c = fmtCount(n);
  return c ? c + ' subscribers' : '';
}

/* ─── Relative time ─── */
function fmtTimeAgo(dateStr) {
  if (!dateStr) return '';
  const seconds = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
  const intervals = [
    [31536000, 'year'], [2592000, 'month'], [604800, 'week'],
    [86400, 'day'], [3600, 'hour'], [60, 'minute'],
  ];
  for (const [secs, label] of intervals) {
    const count = Math.floor(seconds / secs);
    if (count >= 1) return `${count} ${label}${count > 1 ? 's' : ''} ago`;
  }
  return 'just now';
}

/* ─── CSV parsing ─── */
function parseList(str) {
  return (str || '').split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
}

/* ─── 3-Tier Filter Pipeline ─── */
const ALLOW_FILTERS = [
  function allowedChannels(video, settings) {
    const allowed = parseList(settings.allowedChannels);
    if (allowed.length === 0) return 'pass';
    const ch = video.snippet.channelTitle.toLowerCase();
    return allowed.some(a => ch.includes(a) || a.includes(ch)) ? 'allow' : 'pass';
  },
];

const BLOCK_FILTERS = [
  function blockedKeywords(video, settings) {
    const blocked = parseList(settings.blockedKeywords);
    if (blocked.length === 0) return 'pass';
    const text = (video.snippet.title + ' ' + (video.snippet.description || '')).toLowerCase();
    return blocked.some(kw => text.includes(kw)) ? 'block' : 'pass';
  },
  function blockedChannels(video, settings) {
    const blocked = parseList(settings.blockedChannels);
    if (blocked.length === 0) return 'pass';
    const ch = video.snippet.channelTitle.toLowerCase();
    return blocked.some(b => ch.includes(b) || b.includes(ch)) ? 'block' : 'pass';
  },
];

const CONSTRAINT_FILTERS = [
  function maxDuration(video, settings) {
    const maxSec = (settings.maxDuration || 10) * 60;
    return video.durationSec > maxSec ? 'block' : 'pass';
  },
  // Language filtering is handled API-side via relevanceLanguage parameter.
  // Client-side hard-blocking is too aggressive — most YouTube videos have
  // inaccurate or missing language metadata, causing false rejections.
];

function runFilterPipeline(videos, settings) {
  return videos.filter(video => {
    for (const fn of ALLOW_FILTERS) {
      if (fn(video, settings) === 'allow') return true;
    }
    for (const fn of BLOCK_FILTERS) {
      if (fn(video, settings) === 'block') return false;
    }
    for (const fn of CONSTRAINT_FILTERS) {
      if (fn(video, settings) === 'block') return false;
    }
    return true;
  });
}

/* ─── YouTube API ─── */
async function searchYouTube(apiKey, query, settings, pageToken = '', opts = {}) {
  const maxMin = settings.maxDuration || 10;
  let videoDuration;
  if (maxMin <= 4) videoDuration = 'short';
  else if (maxMin <= 20) videoDuration = 'medium';

  const langs = settings.languages || [];
  const primaryLang = langs[0] || 'en';
  const forKids = FOR_KIDS_TRANSLATIONS[primaryLang] || FOR_KIDS_TRANSLATIONS.en;

  const params = new URLSearchParams({
    part: 'snippet',
    q: query + ' ' + forKids,
    type: 'video',
    maxResults: String(opts.maxResults || 24),
    safeSearch: settings.safeSearch || 'strict',
    relevanceLanguage: primaryLang,
    order: opts.order || 'relevance',
    key: apiKey,
    ...(pageToken ? { pageToken } : {}),
    ...(videoDuration ? { videoDuration } : {}),
  });
  if (opts.publishedAfter) params.set('publishedAfter', opts.publishedAfter);
  const region = LANG_TO_REGION[primaryLang];
  if (region) params.set('regionCode', region);

  const resp = await fetch(ytApiUrl('/youtube/v3/search', params));
  if (!resp.ok) throw new Error(`YouTube search failed (${resp.status})`);
  return resp.json();
}

async function getVideoDetails(apiKey, ids) {
  const params = new URLSearchParams({
    part: 'contentDetails,snippet,statistics',
    id: ids.join(','),
    key: apiKey,
  });
  const resp = await fetch(ytApiUrl('/youtube/v3/videos', params));
  if (!resp.ok) throw new Error(`YouTube details failed (${resp.status})`);
  return resp.json();
}

async function getChannelDetails(apiKey, channelIds) {
  const unique = [...new Set(channelIds)];
  if (!unique.length) return {};
  const params = new URLSearchParams({
    part: 'statistics',
    id: unique.join(','),
    key: apiKey,
  });
  const resp = await fetch(ytApiUrl('/youtube/v3/channels', params));
  if (!resp.ok) return {};
  const data = await resp.json();
  const map = {};
  for (const ch of data.items || []) {
    map[ch.id] = ch.statistics?.subscriberCount || null;
  }
  return map;
}

          value={pin}
          autoFocus
          onChange={e => { setPin(e.target.value); setError(''); }}
          onKeyDown={e => {
            if (e.key === 'Enter') {
              if (pin === correctPin) onSuccess();
              else setError('Wrong PIN, try again');
            }
          }}
        />
        {error && <div className="pin-error">{error}</div>}
        <div className="settings-btn-row" style={{justifyContent:'center', borderTop:'none', paddingTop:0}}>
          <button className="btn-cancel" onClick={onCancel}>Cancel</button>
          <button className="btn-save" onClick={() => {
            if (pin === correctPin) onSuccess();
            else setError('Wrong PIN, try again');
          }}>Unlock</button>
        </div>
      </div>
    </div>
  );
}

function LanguageList({ languages, onChange }) {
  const [newLang, setNewLang] = useState('');

  function addLang() {
    const code = newLang.trim().toLowerCase();
    if (code && !languages.includes(code)) {
      onChange([...languages, code]);
      setNewLang('');
    }
  }
  function removeLang(idx) {
    onChange(languages.filter((_, i) => i !== idx));
  }
  function moveLang(idx, dir) {
    const arr = [...languages];
    const target = idx + dir;
    if (target < 0 || target >= arr.length) return;
    [arr[idx], arr[target]] = [arr[target], arr[idx]];
    onChange(arr);
  }

  const LANG_NAMES = {
    en:'English', fr:'French', es:'Spanish', de:'German', it:'Italian',
    pt:'Portuguese', nl:'Dutch', ru:'Russian', ja:'Japanese', ko:'Korean',
    zh:'Chinese', ar:'Arabic', hi:'Hindi', sv:'Swedish', pl:'Polish',
    ro:'Romanian', tr:'Turkish',
  };

  return (
    <div>
      <div className="lang-list">
        {languages.map((lang) => (
          <div key={lang} className="lang-item">
            <span className="lang-item-label">{LANG_NAMES[lang] || lang}</span>
            <span className="lang-item-priority">{languages.indexOf(lang) === 0 ? 'primary' : 'fallback'}</span>
            <button onClick={() => moveLang(languages.indexOf(lang), -1)} title="Move up">&#8593;</button>
            <button onClick={() => moveLang(languages.indexOf(lang), 1)} title="Move down">&#8595;</button>
            <button onClick={() => removeLang(languages.indexOf(lang))} title="Remove">&#215;</button>
          </div>
        ))}
      </div>
      <div style={{display:'flex', gap:6, marginTop:8}}>
        <input
          className="settings-input"
          style={{flex:1, padding:'6px 10px', fontSize:12}}
          type="text"
          placeholder="e.g. fr, en, es"
          value={newLang}
          onChange={e => setNewLang(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addLang(); } }}
        />
        <button
          onClick={addLang}
          style={{
            padding:'6px 14px', background:'var(--surface)',
            border:'1px solid var(--border)', borderRadius:6, color:'var(--text-secondary)',
            fontSize:12, cursor:'pointer', fontFamily:'inherit',
          }}
        >Add</button>
      </div>
    </div>
  );
}

// Promise-based YT API ready detection (avoids global overwrite race)
let _ytResolve;
const _ytReady = new Promise(r => { _ytResolve = r; });
if (window.YT && window.YT.Player) _ytResolve();
else {
  const _prev = window.onYouTubeIframeAPIReady;
  window.onYouTubeIframeAPIReady = () => { if (_prev) _prev(); _ytResolve(); };
}

function PlayerOverlay({ video, onClose }) {
  const playerRef = useRef(null);
  const [playerError, setPlayerError] = useState(null);
  const [isPlaying, setIsPlaying] = useState(true);

  useEffect(() => {
    let cancelled = false;
    setPlayerError(null);
    setIsPlaying(true);

    if (!window.YT) {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }

    _ytReady.then(() => {
      if (cancelled) return;
      if (playerRef.current) {
        try { playerRef.current.destroy(); } catch {}
      }
      playerRef.current = new window.YT.Player('yt-player-target', {
        videoId: video.id,
        width: '100%',
        height: '100%',
        playerVars: {
          autoplay: 1,
          rel: 0,
          modestbranding: 1,
          controls: 0,        // hide native controls — we overlay our own
          disablekb: 1,        // disable keyboard shortcuts in iframe
          iv_load_policy: 3,   // disable annotations
          origin: window.location.origin,
        },
        events: {
          onStateChange: (event) => {
            if (cancelled) return;
            if (event.data === 0) onClose(); // ENDED
            setIsPlaying(event.data === 1);
          },
          onError: (event) => {
            if (cancelled) return;
            const code = event.data;
            if (code === 101 || code === 150) setPlayerError('embed');
            else if (code === 100) setPlayerError('notfound');
            else setPlayerError('generic');
          },
        },
      });
    });

    return () => {
      cancelled = true;
      if (playerRef.current) {
        try { playerRef.current.destroy(); } catch {}
        playerRef.current = null;
      }
    };
  }, [video.id]);

  const [progress, setProgress] = useState(0);
  const [duration, setDuration] = useState(0);
  const [showControls, setShowControls] = useState(true);
  const controlsTimer = useRef(null);
  const progressBarRef = useRef(null);

  // Poll progress
  useEffect(() => {
    const iv = setInterval(() => {
      if (!playerRef.current) return;
      try {
        setProgress(playerRef.current.getCurrentTime() || 0);
        const d = playerRef.current.getDuration();
        if (d > 0) setDuration(d);
      } catch {}
    }, 500);
    return () => clearInterval(iv);
  }, []);

  function togglePlayPause() {
    if (!playerRef.current) return;
    try {
      const state = playerRef.current.getPlayerState();
      if (state === 1) playerRef.current.pauseVideo();
      else playerRef.current.playVideo();
    } catch {}
    flashControls();
  }

  function flashControls() {
    setShowControls(true);
    if (controlsTimer.current) clearTimeout(controlsTimer.current);
    controlsTimer.current = setTimeout(() => setShowControls(false), 3000);
  }

  function handleSeek(e) {
    if (!progressBarRef.current || !playerRef.current || !duration) return;
    const rect = progressBarRef.current.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    playerRef.current.seekTo(pct * duration, true);
    setProgress(pct * duration);
  }

  function skip(seconds) {
    if (!playerRef.current) return;
    try {
      const cur = playerRef.current.getCurrentTime();
      playerRef.current.seekTo(Math.max(0, cur + seconds), true);
    } catch {}
    flashControls();
  }

  const ytLink = `https://www.youtube.com/watch?v=${video.id}`;

  return (
    <div className="player-overlay" onClick={onClose}>
      <div className="player-container" onClick={e => e.stopPropagation()}>
        <div className="player-close">
          <button className="player-close-btn" onClick={onClose}>&#10005;</button>
        </div>
        <div className="player-body">
          {playerError ? (
            <div className="player-error">
              <div style={{fontSize:'36px'}}>
                {playerError === 'embed' ? '\ud83d\udd12' : playerError === 'notfound' ? '\ud83d\udd0d' : '\u26a0\ufe0f'}
              </div>
              <div style={{fontSize:'16px', maxWidth:'400px', lineHeight:'1.5'}}>
                {playerError === 'embed'
                  ? "This video doesn't allow embedded playback."
                  : playerError === 'notfound'
                  ? "This video wasn't found or has been removed."
                  : "Something went wrong loading this video."}
              </div>
              {playerError === 'embed' && (
                <a href={ytLink} target="_blank" rel="noopener noreferrer">
                  Watch on YouTube.com
                </a>
              )}
            </div>
          ) : (
            <div style={{position:'relative', width:'100%', aspectRatio:'16/9'}}
              onMouseMove={flashControls} onTouchStart={flashControls}>
              <div id="yt-player-target" style={{width:'100%', height:'100%'}} />
              {/* Overlay blocks YouTube UI clicks (end cards, annotations) */}
              <div
                onClick={togglePlayPause}
                style={{
                  position:'absolute', inset:0, zIndex:2, cursor:'pointer',
                  display:'flex', alignItems:'center', justifyContent:'center',
                }}
              >
                {/* Center play/pause */}
                {(!isPlaying || showControls) && (
                  <div style={{
                    width:68, height:48, background:'rgba(0,0,0,0.6)', borderRadius:12,
                    display:'flex', alignItems:'center', justifyContent:'center',
                    opacity: !isPlaying ? 1 : 0.7,
                    transition: 'opacity 0.2s',
                  }}>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                      {isPlaying
                        ? <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        : <path d="M8 5v14l11-7z"/>}
                    </svg>
                  </div>
                )}
              </div>
              {/* Control bar */}
              <div style={{
                position:'absolute', bottom:0, left:0, right:0, zIndex:3,
                background:'linear-gradient(transparent, rgba(0,0,0,0.85))',
                padding:'24px 12px 8px',
                opacity: showControls || !isPlaying ? 1 : 0,
                transition: 'opacity 0.3s',
                pointerEvents: showControls || !isPlaying ? 'auto' : 'none',
              }}>
                {/* Progress bar */}
                <div ref={progressBarRef} onClick={handleSeek}
                  style={{height:14, cursor:'pointer', display:'flex', alignItems:'center', padding:'4px 0'}}>
                  <div style={{
                    width:'100%', height:3, background:'rgba(255,255,255,0.2)',
                    borderRadius:2, position:'relative', overflow:'visible',
                  }}>
                    <div style={{
                      width: duration > 0 ? `${(progress/duration)*100}%` : '0%',
                      height:'100%', background:'#ff0000', borderRadius:2,
                      position:'relative',
                    }}>
                      <div style={{
                        position:'absolute', right:-6, top:-4.5, width:12, height:12,
                        borderRadius:'50%', background:'#ff0000',
                      }} />
                    </div>
                  </div>
                </div>
                {/* Controls row */}
                <div style={{display:'flex', alignItems:'center', gap:12, marginTop:4}}>
                  <button onClick={(e) => {e.stopPropagation(); togglePlayPause();}}
                    style={{background:'none', border:'none', cursor:'pointer', padding:4, display:'flex'}}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                      {isPlaying
                        ? <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        : <path d="M8 5v14l11-7z"/>}
                    </svg>
                  </button>
                  <button onClick={(e) => {e.stopPropagation(); skip(-10);}}
                    style={{background:'none', border:'none', cursor:'pointer', padding:4, display:'flex'}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                      <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
                      <text x="9" y="16" fontSize="7" fontFamily="Arial" fontWeight="700">10</text>
                    </svg>
                  </button>
                  <button onClick={(e) => {e.stopPropagation(); skip(10);}}
                    style={{background:'none', border:'none', cursor:'pointer', padding:4, display:'flex'}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                      <path d="M12.01 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
                      <text x="9" y="16" fontSize="7" fontFamily="Arial" fontWeight="700">10</text>
                    </svg>
                  </button>
                  <span style={{color:'white', fontSize:12, fontFamily:'monospace', marginLeft:'auto'}}>
                    {fmtDuration(Math.floor(progress))} / {fmtDuration(Math.floor(duration))}
                  </span>
                </div>
              </div>
            </div>
          )}
          <div className="player-info">
            <div className="player-title">{video.snippet.title}</div>
            <div className="player-channel-row">
              <div className="channel-avatar"></div>
              <div>
                <div className="player-channel-name">{video.snippet.channelTitle}</div>
                {video.subscriberCount && (
                  <div style={{fontSize:12, color:'var(--text-secondary)'}}>{fmtSubscribers(video.subscriberCount)}</div>
                )}
              </div>
            </div>
            <div className="player-badges">
              {video.statistics?.likeCount && (
                <span className="player-badge">{'\ud83d\udc4d'} {fmtViews(video.statistics.likeCount).replace(' views','')}</span>
              )}
              {video.statistics?.viewCount && (
                <span className="player-badge">{fmtViews(video.statistics.viewCount)}</span>
              )}
              {video.snippet.publishedAt && (
                <span className="player-badge">{fmtTimeAgo(video.snippet.publishedAt)}</span>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Infinite Scroll Sentinel ─── */
function ScrollSentinel({ onVisible }) {
  const ref = useRef();
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) onVisible(); },
      { rootMargin: '400px' }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [onVisible]);
  return <div ref={ref} style={{height:1}} />;
}

/* ─── App ─── */
function App() {
  const [settings, setSettings] = useState(loadSettings);
  const [query, setQuery] = useState('');
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [loadingMore, setLoadingMore] = useState(false);
  const [error, setError] = useState('');
  const [playingVideo, setPlayingVideo] = useState(null);
  const [showPin, setShowPin] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showApprovalPin, setShowApprovalPin] = useState(false);
  const [activeTopic, setActiveTopic] = useState(null);
  const [isSearchView, setIsSearchView] = useState(false);
  const [searchFilter, setSearchFilter] = useState('all');
  const [initialLoaded, setInitialLoaded] = useState(false);
  const [watchCount, setWatchCount] = useState(0);
  const pendingVideoRef = useRef(null);
  const [nextPageToken, setNextPageToken] = useState(null);
  const currentQueryRef = useRef('');
  const currentIsTopicRef = useRef(false);

  const isSetup = Boolean(settings.apiKey) || Boolean(PROXY_URL);

  /* Fetch + enrich a page of results, returns { videos, nextPageToken } */
  const fetchPage = useCallback(async (q, pageToken = '', opts = {}) => {
    const searchResp = await searchYouTube(settings.apiKey, q, settings, pageToken, opts);
    if (searchResp.error) throw new Error(searchResp.error.message || 'API error');
    const ids = (searchResp.items || []).map(i => i.id.videoId).filter(Boolean);
    if (!ids.length) return { videos: [], nextPageToken: null };
    const detailResp = await getVideoDetails(settings.apiKey, ids);
    const enriched = detailResp.items.map(item => ({
      ...item,
      durationSec: parseDuration(item.contentDetails.duration),
      subscriberCount: null,
    }));
    return {
      videos: runFilterPipeline(enriched, settings),
      nextPageToken: searchResp.nextPageToken || null,
    };
  }, [settings]);

  /* Search with a fresh-first approach: recent videos first, then backfill with all-time.
     Uses at most 2 API search calls + 2 detail calls = ~210 units per search. */
  const doSearch = useCallback(async (q, isTopicSearch = false) => {
    if (!q.trim() || (!settings.apiKey && !PROXY_URL)) return;
    setLoading(true);
    setError('');
    setNextPageToken(null);
    currentQueryRef.current = q;
    currentIsTopicRef.current = isTopicSearch;
    try {
      const seen = new Set();
      const collected = [];

      // Round 1: recent videos (last 30 days, ordered by date)
      const recentDate = new Date(Date.now() - 30 * 86400000).toISOString();
      const recent = await fetchPage(q, '', { publishedAfter: recentDate, order: 'date' });
      for (const v of recent.videos) {
        if (!seen.has(v.id)) { seen.add(v.id); collected.push(v); }
      }

      // Round 2: all-time relevance (if not enough from recent)
      if (collected.length < 8) {
        const allTime = await fetchPage(q);
        for (const v of allTime.videos) {
          if (!seen.has(v.id)) { seen.add(v.id); collected.push(v); }
        }
        setNextPageToken(allTime.nextPageToken);
      } else {
        setNextPageToken(recent.nextPageToken);
      }

      setVideos(freshSort(collected));
      if (!isTopicSearch) setIsSearchView(true);
    } catch (err) {
      setError(err.message || 'Something went wrong');
    }
    setLoading(false);
  }, [settings, fetchPage]);

  const loadMore = useCallback(async () => {
    if (!nextPageToken || loadingMore || loading) return;
    setLoadingMore(true);
    try {
      const result = await fetchPage(currentQueryRef.current, nextPageToken);
      setVideos(prev => {
        const existingIds = new Set(prev.map(v => v.id));
        const newVids = result.videos.filter(v => !existingIds.has(v.id));
        return [...prev, ...newVids];
      });
      setNextPageToken(result.nextPageToken);
    } catch {}
    setLoadingMore(false);
  }, [nextPageToken, loadingMore, loading, fetchPage]);

  /* Mixed home feed: 3 random topics, recent + all-time.
     Uses ~6 search + ~6 detail calls = ~630 units total. */
  const doMixedSearch = useCallback(async (allTopics) => {
    setLoading(true);
    setError('');
    setNextPageToken(null);
    setIsSearchView(false);
    currentQueryRef.current = '';
    currentIsTopicRef.current = true;

    try {
      // RSS mode: zero API quota, with API backfill if too few results
      if (settings.useRssHomeFeed) {
        const rssVideos = await fetchRssHomeFeed(settings);
        if (rssVideos.length >= 4) {
          updateLastVisit();
          setVideos(rssVideos);
          setLoading(false);
          return;
        }
        // Too few RSS results — backfill with a single API search
        try {
          const backfill = await fetchPage(allTopics[Math.floor(Math.random() * allTopics.length)]);
          const seen = new Set(rssVideos.map(v => v.id));
          const combined = [...rssVideos, ...backfill.videos.filter(v => !seen.has(v.id))];
          updateLastVisit();
          setVideos(freshSort(combined));
          setLoading(false);
          return;
        } catch {}
        // Even backfill failed — show what RSS got
        updateLastVisit();
        setVideos(rssVideos);
        setLoading(false);
        return;
      }

      // API mode: uses quota
      const seen = new Set();
      const collected = [];

      function addNew(vids) {
        for (const v of vids) {
          if (!seen.has(v.id)) { seen.add(v.id); collected.push(v); }
        }
      }

      // Weight topic selection toward kid's favorites
      const taste = getTasteProfile();
      const favoriteTopicSet = new Set(taste.topTopics);
      const weighted = [...allTopics].sort((a, b) => {
        const aFav = favoriteTopicSet.has(a) ? 1 : 0;
        const bFav = favoriteTopicSet.has(b) ? 1 : 0;
        // Favorites get 70% chance of being picked, rest is random
        return (bFav - aFav) * 0.7 + (Math.random() - 0.5);
      });
      const picks = weighted.slice(0, 3);
      const recentDate = new Date(Date.now() - 30 * 86400000).toISOString();

      const recentResults = await Promise.allSettled(
        picks.map(topic => fetchPage(topic, '', { publishedAfter: recentDate, order: 'date', maxResults: 8 }))
      );
      for (const r of recentResults) {
        if (r.status === 'fulfilled') addNew(r.value.videos);
      }

      if (collected.length < 8) {
        const allTimeResults = await Promise.allSettled(
          picks.map(topic => fetchPage(topic, '', { maxResults: 8 }))
        );
        for (const r of allTimeResults) {
          if (r.status === 'fulfilled') addNew(r.value.videos);
        }
      }

      updateLastVisit();
      setVideos(freshSort(collected));
    } catch (err) {
      setError(err.message || 'Something went wrong');
    }
    setLoading(false);
  }, [settings, fetchPage]);

  const topics = getTopics(settings);

  useEffect(() => {
    if (isSetup && !initialLoaded) {
      setInitialLoaded(true);
      setActiveTopic(null);
      doMixedSearch(topics);
    }
  }, [isSetup, initialLoaded, doMixedSearch]);

  async function handleChipSelect(topic) {
    setActiveTopic(topic);
    setIsSearchView(false);
    setSearchFilter('all');
    if (topic === null) {
      doMixedSearch(topics);
    } else if (settings.useRssHomeFeed) {
      // RSS mode: filter by topic index
      setLoading(true);
      const topicIdx = topics.indexOf(topic);
      const lang = (settings.languages || [])[0] || 'en';
      const channels = CURATED_CHANNELS[lang] || CURATED_CHANNELS.en;
      const topicChannels = Object.entries(channels)
        .filter(([_, idx]) => idx === topicIdx)
        .map(([id]) => id);
      if (topicChannels.length > 0) {
        const feeds = await Promise.allSettled(topicChannels.map(id => fetchRssFeed(id)));
        const videos = feeds
          .filter(r => r.status === 'fulfilled')
          .flatMap(r => r.value.map(rssToVideoObj));
        setVideos(freshSort(runFilterPipeline(
          videos.map(v => ({...v, durationSec: 0})),
          {...settings, maxDuration: 9999}
        )));
      } else {
        doSearch(topic, true);
      }
      setLoading(false);
    } else {
      doSearch(topic, true);
    }
  }

  function handleSearch() {
    if (query.trim()) {
      setActiveTopic(null);
      doSearch(query, false);
    }
  }

  function getFilteredVideos() {
    if (searchFilter === 'short') return videos.filter(v => v.durationSec <= 240);
    if (searchFilter === 'recent') {
      return [...videos].sort((a, b) =>
        new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt)
      );
    }
    return videos;
  }

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'Escape') {
        if (playingVideo) setPlayingVideo(null);
        else if (showSettings) setShowSettings(false);
        else if (showApprovalPin) setShowApprovalPin(false);
        else if (showPin) setShowPin(false);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [playingVideo, showSettings, showPin, showApprovalPin]);

  function playVideo(video) {
    markWatched(video.id, {
      ch: video.snippet?.channelTitle || '',
      q: currentQueryRef.current || '',
      topic: activeTopic || '',
    });
    setPlayingVideo(video);
  }

  function handleVideoClick(videoId) {
    const video = videos.find(v => v.id === videoId);
    if (!video) return;
    const limit = settings.videosPerApproval || 0;
    if (limit > 0 && watchCount >= limit) {
      pendingVideoRef.current = video;
      setShowApprovalPin(true);
    } else {
      playVideo(video);
      setWatchCount(prev => prev + 1);
    }
  }

  function handleApprovalSuccess() {
    setShowApprovalPin(false);
    setWatchCount(1);
    if (pendingVideoRef.current) {
      playVideo(pendingVideoRef.current);
      pendingVideoRef.current = null;
    }
  }

  if (!isSetup) {
    return <SetupScreen onSave={(s) => setSettings(s)} />;
  }

  const displayVideos = getFilteredVideos();

  return (
    <>
      <Header
        query={query}
        onQueryChange={setQuery}
        onSearch={handleSearch}
        onTripleTap={() => setShowPin(true)}
      />

      <ChipsBar
        topics={topics}
        activeTopic={activeTopic}
        onSelect={handleChipSelect}
      />

      <main>
        {loading && (
          <div className="status-msg">
            <span className="emoji">{'\u23f3'}</span>Finding great videos...
          </div>
        )}

        {error && (
          <div className="status-msg" style={{color:'var(--block-color)'}}>
            <span className="emoji">{'\ud83d\ude15'}</span>{error}
          </div>
        )}

        {!loading && !error && videos.length === 0 && initialLoaded && (
          <div className="status-msg">
            <span className="emoji">{'\ud83d\udd0d'}</span>No videos found. Try a different search!
          </div>
        )}

        {!loading && !error && displayVideos.length > 0 && isSearchView && (
          <>
            <div className="chips-bar" style={{padding:'0 0 16px', borderBottom:'none'}}>
              {['all', 'short', 'recent'].map(f => (
                <button
                  key={f}
                  className={'chip' + (searchFilter === f ? ' active' : '')}
                  onClick={() => setSearchFilter(f)}
                >
                  {f === 'all' ? 'All' : f === 'short' ? 'Short (< 4 min)' : 'Recently uploaded'}
                </button>
              ))}
            </div>
            <div className="search-results">
              {displayVideos.map(v => (
                <SearchResult key={v.id} video={v} onClick={handleVideoClick} />
              ))}
            </div>
          </>
        )}

        {!loading && !error && displayVideos.length > 0 && !isSearchView && (
          <div className="video-grid">
            {displayVideos.map(v => (
              <VideoCard key={v.id} video={v} onClick={handleVideoClick} />
            ))}
          </div>
        )}

        {loadingMore && (
          <div style={{textAlign:'center', padding:'24px 0'}}>
            <div className="loading-spinner"></div>
          </div>
        )}

        {!loading && !loadingMore && nextPageToken && displayVideos.length > 0 && (
          <ScrollSentinel onVisible={loadMore} />
        )}
      </main>

      {playingVideo && (
        <PlayerOverlay video={playingVideo} onClose={() => setPlayingVideo(null)} />
      )}

      {showApprovalPin && (
        <PinPrompt
          correctPin={settings.parentPin}
          onSuccess={handleApprovalSuccess}
          onCancel={() => { setShowApprovalPin(false); pendingVideoRef.current = null; }}
        />
      )}

      {showPin && !showSettings && (
        <PinPrompt
          correctPin={settings.parentPin}
          onSuccess={() => { setShowPin(false); setShowSettings(true); }}
          onCancel={() => setShowPin(false)}
        />
      )}

      {showSettings && (
        <SettingsModal
          settings={settings}
          onSave={(s) => { setSettings(s); setShowSettings(false); }}
          onCancel={() => setShowSettings(false)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(() => {});
}
</script>
