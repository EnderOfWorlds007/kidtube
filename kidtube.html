<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f0f0f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<link rel="manifest" href="/manifest.json" />
<title>YouTube</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #272727;
    --elevated: #181818;
    --border: #303030;
    --text-primary: #ffffff;
    --text-secondary: #aaaaaa;
    --text-tertiary: #717171;
    --accent-red: #ff0000;
    --accent-blue: #3ea6ff;
    --chip-active-bg: #ffffff;
    --chip-active-text: #0f0f0f;
    --chip-bg: #272727;
    --chip-text: #ffffff;
    --search-bg: #121212;
    --search-border: #303030;
    --search-btn-bg: #222222;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-full: 9999px;
    --header-height: 56px;
    --allow-color: #48bb78;
    --block-color: #fc8181;
    --constraint-color: #7c9bf5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Roboto', Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* Header */
  .header {
    background: var(--bg);
    height: var(--header-height);
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-logo {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .header-logo svg { height: 20px; }
  .header-search {
    flex: 1;
    display: flex;
    justify-content: center;
  }
  .header-search-inner {
    display: flex;
    max-width: 540px;
    width: 100%;
    align-items: center;
  }
  .search-input {
    flex: 1;
    background: var(--search-bg);
    border: 1px solid var(--search-border);
    border-right: none;
    border-radius: 20px 0 0 20px;
    padding: 8px 16px;
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
    font-family: inherit;
  }
  .search-input::placeholder { color: var(--text-tertiary); }
  .search-input:focus { border-color: #1c62b9; }
  .search-btn {
    background: var(--search-btn-bg);
    border: 1px solid var(--search-border);
    border-radius: 0 20px 20px 0;
    padding: 0 20px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .search-btn svg { fill: var(--text-primary); }
  .mic-btn {
    background: var(--elevated);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-left: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .mic-btn svg { fill: var(--text-primary); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4285f4, #34a853);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 14px;
    font-weight: 500;
  }
  .search-icon-btn {
    display: none;
    background: none;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .search-icon-btn svg { fill: var(--text-primary); }
  .mobile-search-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-height);
    background: var(--bg);
    z-index: 150;
    padding: 8px;
    align-items: center;
    gap: 8px;
  }
  .mobile-search-overlay.active { display: flex; }
  .mobile-search-back {
    background: none;
    border: none;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .mobile-search-back svg { fill: var(--text-primary); }

  /* Category Chips */
  .chips-bar {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .chips-bar::-webkit-scrollbar { display: none; }
  .chip {
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  .chip.active {
    background: var(--chip-active-bg);
    color: var(--chip-active-text);
  }
  .chip:not(.active) {
    background: var(--chip-bg);
    color: var(--chip-text);
  }
  .chip:not(.active):hover { background: #3d3d3d; }

  /* Main */
  main { padding: 16px; max-width: 1284px; margin: 0 auto; }

  /* Video Grid */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .video-card { cursor: pointer; }
  .video-card:hover .video-title { color: var(--text-primary); }
  .thumb-wrap {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .thumb-wrap img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: var(--surface);
  }
  .duration-badge {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .video-meta {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .channel-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    flex-shrink: 0;
  }
  .video-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text-primary);
  }
  .video-channel {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .video-stats {
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* Search Results */
  .search-results {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .search-result {
    display: flex;
    gap: 16px;
    cursor: pointer;
  }
  .search-result .thumb-wrap {
    flex-shrink: 0;
    width: 360px;
  }
  .search-result-info {
    flex: 1;
    min-width: 0;
  }
  .search-result-title {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text-primary);
  }
  .search-result-stats {
    color: var(--text-secondary);
    font-size: 12px;
    margin-top: 6px;
  }
  .search-result-channel {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .search-result-channel .channel-avatar {
    width: 24px;
    height: 24px;
  }
  .search-result-channel span {
    color: var(--text-secondary);
    font-size: 12px;
  }
  .search-result-desc {
    color: var(--text-secondary);
    font-size: 12px;
    margin-top: 8px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Player Overlay */
  .player-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .player-container { width: 100%; max-width: 680px; }
  .player-close {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
  }
  .player-close-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .player-close-btn:hover { background: rgba(255,255,255,0.2); }
  .player-body {
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .player-body iframe,
  .player-body #yt-player-target {
    width: 100%;
    aspect-ratio: 16/9;
    display: block;
    border: none;
  }
  .player-info { padding: 16px; }
  .player-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text-primary);
  }
  .player-channel-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  .player-channel-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .player-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .player-badge {
    background: var(--surface);
    padding: 6px 14px;
    border-radius: var(--radius-full);
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 500;
  }
  .player-error {
    aspect-ratio: 16/9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    color: white;
    padding: 20px;
    text-align: center;
    gap: 16px;
  }
  .player-error a {
    padding: 10px 24px;
    background: var(--accent-red);
    color: white;
    border-radius: var(--radius-sm);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 20px;
  }
  .modal {
    background: var(--elevated);
    border-radius: var(--radius);
    padding: 32px;
    max-width: 540px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    color: var(--text-primary);
  }
  .modal h2 { font-size: 20px; font-weight: 600; }
  .modal .subtitle {
    color: var(--text-secondary);
    font-size: 13px;
    margin-top: 4px;
    margin-bottom: 24px;
  }
  .settings-tier { margin-bottom: 24px; }
  .settings-tier-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .settings-tier-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .settings-tier-title {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .settings-tier-hint {
    color: var(--text-tertiary);
    font-size: 11px;
  }
  .settings-tier-body {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .settings-label {
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .settings-input,
  .settings-textarea,
  .settings-select {
    width: 100%;
    background: var(--search-bg);
    border: 1px solid var(--search-border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .settings-textarea {
    resize: vertical;
    min-height: 60px;
  }
  .settings-input:focus,
  .settings-textarea:focus,
  .settings-select:focus {
    border-color: var(--accent-blue);
  }
  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .settings-row .settings-input { width: 80px; text-align: center; }
  .settings-btn-row {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .btn-cancel {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-full);
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-cancel:hover { background: var(--surface); }
  .btn-save {
    padding: 8px 20px;
    background: var(--accent-blue);
    border: none;
    border-radius: var(--radius-full);
    color: var(--bg);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-save:hover { opacity: 0.9; }

  /* PIN */
  .pin-prompt { text-align: center; }
  .pin-prompt input {
    max-width: 200px;
    margin: 16px auto;
    text-align: center;
    font-size: 24px;
    letter-spacing: 8px;
    background: var(--search-bg);
    border: 1px solid var(--search-border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    padding: 10px;
    outline: none;
    display: block;
  }
  .pin-prompt input:focus { border-color: var(--accent-blue); }
  .pin-error {
    color: var(--block-color);
    font-size: 13px;
    margin-top: 8px;
  }

  /* Setup */
  .setup-screen {
    max-width: 560px;
    margin: 80px auto;
    padding: 40px;
    background: var(--elevated);
    border-radius: var(--radius);
    text-align: center;
  }
  .setup-screen h2 { font-size: 24px; margin-bottom: 8px; }
  .setup-screen p { color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
  .setup-screen input {
    width: 100%;
    padding: 12px 16px;
    background: var(--search-bg);
    border: 1px solid var(--search-border);
    border-radius: 10px;
    font-size: 15px;
    color: var(--text-primary);
    outline: none;
    margin-bottom: 16px;
  }
  .setup-screen input:focus { border-color: var(--accent-blue); }
  .setup-screen .instructions {
    text-align: left;
    background: var(--bg);
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 24px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-secondary);
  }
  .setup-screen .instructions strong { color: var(--text-primary); }
  .setup-screen .instructions code {
    background: var(--surface);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--accent-blue);
  }
  .setup-screen .instructions ol { padding-left: 20px; }
  .setup-screen .instructions a { color: var(--accent-blue); }
  .btn-primary {
    padding: 12px 32px;
    background: var(--accent-blue);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-full);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Status */
  .status-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-size: 16px;
  }
  .status-msg .emoji { font-size: 48px; display: block; margin-bottom: 16px; }

  /* Language list */
  .lang-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .lang-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--search-bg);
    border: 1px solid var(--search-border);
    border-radius: 6px;
    padding: 6px 10px;
  }
  .lang-item-label {
    flex: 1;
    font-size: 13px;
    color: var(--text-primary);
  }
  .lang-item-priority {
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .lang-item button {
    background: none;
    border: none;
    color: var(--text-tertiary);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
  }
  .lang-item button:hover { color: var(--text-primary); }

  /* Responsive */
  @media (max-width: 1024px) {
    .video-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 768px) {
    .video-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .video-grid { grid-template-columns: 1fr; }
    .header-search { display: none; }
    .search-icon-btn { display: flex; }
    .search-result { flex-direction: column; }
    .search-result .thumb-wrap { width: 100%; }
    .modal { padding: 20px; border-radius: var(--radius) var(--radius) 0 0; }
    .player-container { max-width: 100%; }
    .player-overlay { padding: 0; align-items: flex-start; }
    .player-close { position: absolute; top: 8px; right: 8px; z-index: 10; }
    .setup-screen { margin: 20px 16px; padding: 24px; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── Constants ─── */
const DEFAULT_SETTINGS = {
  apiKey: '',
  parentPin: '1234',
  maxDuration: 10,
  blockedKeywords: '',
  blockedChannels: '',
  allowedChannels: '',
  safeSearch: 'strict',
  languages: [],
};

const TOPICS = [
  'Dinosaurs', 'Space', 'Lego', 'Animals', 'Science',
  'Drawing', 'Music', 'Magic Tricks', 'Nature', 'Cartoons',
];

/* ─── Settings persistence ─── */
function loadSettings() {
  try {
    const raw = localStorage.getItem('kidtube_settings');
    return raw ? { ...DEFAULT_SETTINGS, ...JSON.parse(raw) } : { ...DEFAULT_SETTINGS };
  } catch { return { ...DEFAULT_SETTINGS }; }
}
function saveSettings(s) {
  localStorage.setItem('kidtube_settings', JSON.stringify(s));
}

/* ─── Duration helpers ─── */
function parseDuration(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0);
}
function fmtDuration(seconds) {
  const h = Math.floor(seconds/3600);
  const m = Math.floor((seconds%3600)/60);
  const s = seconds % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

/* ─── View count formatter ─── */
function fmtViews(n) {
  if (!n) return '';
  const num = parseInt(n);
  if (num >= 1_000_000) return (num / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M views';
  if (num >= 1_000) return (num / 1_000).toFixed(1).replace(/\.0$/, '') + 'K views';
  return num + ' views';
}

/* ─── Relative time ─── */
function fmtTimeAgo(dateStr) {
  if (!dateStr) return '';
  const seconds = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
  const intervals = [
    [31536000, 'year'], [2592000, 'month'], [604800, 'week'],
    [86400, 'day'], [3600, 'hour'], [60, 'minute'],
  ];
  for (const [secs, label] of intervals) {
    const count = Math.floor(seconds / secs);
    if (count >= 1) return `${count} ${label}${count > 1 ? 's' : ''} ago`;
  }
  return 'just now';
}

/* ─── CSV parsing ─── */
function parseList(str) {
  return (str || '').split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
}

/* ─── 3-Tier Filter Pipeline ─── */
const ALLOW_FILTERS = [
  function allowedChannels(video, settings) {
    const allowed = parseList(settings.allowedChannels);
    if (allowed.length === 0) return 'pass';
    const ch = video.snippet.channelTitle.toLowerCase();
    return allowed.some(a => ch.includes(a) || a.includes(ch)) ? 'allow' : 'pass';
  },
];

const BLOCK_FILTERS = [
  function blockedKeywords(video, settings) {
    const blocked = parseList(settings.blockedKeywords);
    if (blocked.length === 0) return 'pass';
    const text = (video.snippet.title + ' ' + (video.snippet.description || '')).toLowerCase();
    return blocked.some(kw => text.includes(kw)) ? 'block' : 'pass';
  },
  function blockedChannels(video, settings) {
    const blocked = parseList(settings.blockedChannels);
    if (blocked.length === 0) return 'pass';
    const ch = video.snippet.channelTitle.toLowerCase();
    return blocked.some(b => ch.includes(b) || b.includes(ch)) ? 'block' : 'pass';
  },
];

const CONSTRAINT_FILTERS = [
  function maxDuration(video, settings) {
    const maxSec = (settings.maxDuration || 10) * 60;
    return video.durationSec > maxSec ? 'block' : 'pass';
  },
  function languageFilter(video, settings) {
    const langs = settings.languages || [];
    if (langs.length === 0) return 'pass';
    const videoLang = (video.snippet.defaultLanguage || video.snippet.defaultAudioLanguage || '').toLowerCase();
    if (!videoLang) return 'pass';
    return langs.some(l => videoLang.startsWith(l.toLowerCase())) ? 'pass' : 'block';
  },
];

function runFilterPipeline(videos, settings) {
  return videos.filter(video => {
    for (const fn of ALLOW_FILTERS) {
      if (fn(video, settings) === 'allow') return true;
    }
    for (const fn of BLOCK_FILTERS) {
      if (fn(video, settings) === 'block') return false;
    }
    for (const fn of CONSTRAINT_FILTERS) {
      if (fn(video, settings) === 'block') return false;
    }
    return true;
  });
}

/* ─── YouTube API ─── */
async function searchYouTube(apiKey, query, settings, pageToken = '') {
  const params = new URLSearchParams({
    part: 'snippet',
    q: query + ' for kids',
    type: 'video',
    maxResults: '24',
    safeSearch: settings.safeSearch || 'strict',
    key: apiKey,
    ...(pageToken ? { pageToken } : {}),
  });
  const langs = settings.languages || [];
  if (langs.length > 0) {
    params.set('relevanceLanguage', langs[0]);
  }
  const resp = await fetch(`https://www.googleapis.com/youtube/v3/search?${params}`);
  if (!resp.ok) throw new Error(`YouTube search failed (${resp.status})`);
  return resp.json();
}

async function getVideoDetails(apiKey, ids) {
  const params = new URLSearchParams({
    part: 'contentDetails,snippet,statistics',
    id: ids.join(','),
    key: apiKey,
  });
  const resp = await fetch(`https://www.googleapis.com/youtube/v3/videos?${params}`);
  if (!resp.ok) throw new Error(`YouTube details failed (${resp.status})`);
  return resp.json();
}

function LanguageList({ languages, onChange }) {
  function addLang() {
    const code = prompt('Enter language code (e.g. fr, en, es, de):');
    if (code && code.trim()) {
      onChange([...languages, code.trim().toLowerCase()]);
    }
  }
  function removeLang(idx) {
    onChange(languages.filter((_, i) => i !== idx));
  }
  function moveLang(idx, dir) {
    const arr = [...languages];
    const target = idx + dir;
    if (target < 0 || target >= arr.length) return;
    [arr[idx], arr[target]] = [arr[target], arr[idx]];
    onChange(arr);
  }

  const LANG_NAMES = {
    en:'English', fr:'French', es:'Spanish', de:'German', it:'Italian',
    pt:'Portuguese', nl:'Dutch', ru:'Russian', ja:'Japanese', ko:'Korean',
    zh:'Chinese', ar:'Arabic', hi:'Hindi', sv:'Swedish', pl:'Polish',
    ro:'Romanian', tr:'Turkish',
  };

  return (
    <div>
      <div className="lang-list">
        {languages.map((lang, i) => (
          <div key={i} className="lang-item">
            <span className="lang-item-label">{LANG_NAMES[lang] || lang}</span>

            <button onClick={() => moveLang(i, -1)} title="Move up">&#8593;</button>

            <button onClick={() => removeLang(i)} title="Remove">&#215;</button>

  );

function PlayerOverlay({ video, onClose }) {
  const playerRef = useRef(null);
  const [playerError, setPlayerError] = useState(null);

  useEffect(() => {
    setPlayerError(null);

    if (!window.YT) {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }

    function createPlayer() {
      if (playerRef.current) {
        try { playerRef.current.destroy(); } catch {}
      }
      playerRef.current = new window.YT.Player('yt-player-target', {
        videoId: video.id,
        width: '100%',
        height: '100%',
        playerVars: {
          autoplay: 1,
          rel: 0,
          modestbranding: 1,
          origin: window.location.origin,
        },
        events: {
          onError: (event) => {
            const code = event.data;
            if (code === 101 || code === 150) setPlayerError('embed');
            else if (code === 100) setPlayerError('notfound');
            else setPlayerError('generic');
          },
        },
      });
    }

    if (window.YT && window.YT.Player) createPlayer();
    else window.onYouTubeIframeAPIReady = createPlayer;

    return () => {
      if (playerRef.current) {
        try { playerRef.current.destroy(); } catch {}
        playerRef.current = null;
      }
    };
  }, [video.id]);

  const ytLink = `https://www.youtube.com/watch?v=${video.id}`;

  return (
    <div className="player-overlay" onClick={onClose}>
      <div className="player-container" onClick={e => e.stopPropagation()}>
        <div className="player-close">
          <button className="player-close-btn" onClick={onClose}>&#10005;</button>
        </div>
        <div className="player-body">
          {playerError ? (
            <div className="player-error">
              <div style={{fontSize:'36px'}}>
                {playerError === 'embed' ? '\ud83d\udd12' : playerError === 'notfound' ? '\ud83d\udd0d' : '\u26a0\ufe0f'}
              </div>
              <div style={{fontSize:'16px', maxWidth:'400px', lineHeight:'1.5'}}>
                {playerError === 'embed'
                  ? "This video doesn't allow embedded playback."
                  : playerError === 'notfound'
                  ? "This video wasn't found or has been removed."
                  : "Something went wrong loading this video."}
              </div>
              {playerError === 'embed' && (
                <a href={ytLink} target="_blank" rel="noopener noreferrer">
                  Watch on YouTube.com
                </a>
              )}
            </div>
          ) : (
            <div id="yt-player-target" style={{width:'100%', aspectRatio:'16/9'}} />
          )}
          <div className="player-info">
            <div className="player-title">{video.snippet.title}</div>
            <div className="player-channel-row">
              <div className="channel-avatar"></div>
              <div>
                <div className="player-channel-name">{video.snippet.channelTitle}</div>
              </div>
            </div>
            <div className="player-badges">
              {video.statistics?.likeCount && (
                <span className="player-badge">{'\ud83d\udc4d'} {fmtViews(video.statistics.likeCount).replace(' views','')}</span>
              )}
              {video.statistics?.viewCount && (

function App() {
  const [settings, setSettings] = useState(loadSettings);
  const [query, setQuery] = useState('');
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [playingVideo, setPlayingVideo] = useState(null);
  const [showPin, setShowPin] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [activeTopic, setActiveTopic] = useState(null);
  const [isSearchView, setIsSearchView] = useState(false);
  const [searchFilter, setSearchFilter] = useState('all');
  const [initialLoaded, setInitialLoaded] = useState(false);

  const isSetup = Boolean(settings.apiKey);

  const doSearch = useCallback(async (q, isTopicSearch = false) => {
    if (!q.trim() || !settings.apiKey) return;
    setLoading(true);
    setError('');
    try {
      const searchResp = await searchYouTube(settings.apiKey, q, settings);
      const ids = searchResp.items.map(i => i.id.videoId).filter(Boolean);
      if (!ids.length) { setVideos([]); setLoading(false); return; }
      const detailResp = await getVideoDetails(settings.apiKey, ids);
      const enriched = detailResp.items.map(item => ({
        ...item,
        durationSec: parseDuration(item.contentDetails.duration),
      }));
      setVideos(runFilterPipeline(enriched, settings));
      if (!isTopicSearch) setIsSearchView(true);
    } catch (err) {
      setError(err.message || 'Something went wrong');
    }
    setLoading(false);
  }, [settings]);

  useEffect(() => {
    if (isSetup && !initialLoaded) {
      setInitialLoaded(true);
      const randomTopic = TOPICS[Math.floor(Math.random() * TOPICS.length)];
      setActiveTopic(null);
      doSearch(randomTopic, true);
    }
  }, [isSetup, initialLoaded, doSearch]);

  function handleChipSelect(topic) {
    setActiveTopic(topic);
    setIsSearchView(false);
    setSearchFilter('all');
    const q = topic || TOPICS[Math.floor(Math.random() * TOPICS.length)];
    doSearch(q, true);
  }

  function handleSearch() {
    if (query.trim()) {
      setActiveTopic(null);
      doSearch(query, false);
    }
  }

  function getFilteredVideos() {
    if (searchFilter === 'short') return videos.filter(v => v.durationSec <= 240);
    if (searchFilter === 'recent') {
      return [...videos].sort((a, b) =>
        new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt)
      );
    }
    return videos;
  }

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'Escape') {
        if (playingVideo) setPlayingVideo(null);
        else if (showSettings) setShowSettings(false);
        else if (showPin) setShowPin(false);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [playingVideo, showSettings, showPin]);

  function handleVideoClick(videoId) {
    const video = videos.find(v => v.id === videoId);
    if (video) setPlayingVideo(video);
  }

  if (!isSetup) {
    return <SetupScreen onSave={(s) => setSettings(s)} />;
  }

  const displayVideos = getFilteredVideos();

  return (
    <>
      <Header
        query={query}
        onQueryChange={setQuery}
        onSearch={handleSearch}
        onTripleTap={() => setShowPin(true)}
      />

      <ChipsBar
        topics={TOPICS}
        activeTopic={activeTopic}
        onSelect={handleChipSelect}
      />

      <main>
        {loading && (
          <div className="status-msg">
            <span className="emoji">{'\u23f3'}</span>Finding great videos...
          </div>
        )}

        {error && (
          <div className="status-msg" style={{color:'var(--block-color)'}}>
            <span className="emoji">{'\ud83d\ude15'}</span>{error}
          </div>
        )}

        {!loading && !error && videos.length === 0 && initialLoaded && (
          <div className="status-msg">
            <span className="emoji">{'\ud83d\udd0d'}</span>No videos found. Try a different search!
          </div>
        )}

        {!loading && !error && displayVideos.length > 0 && isSearchView && (
          <>
            <div className="chips-bar" style={{padding:'0 0 16px', borderBottom:'none'}}>
              {['all', 'short', 'recent'].map(f => (
                <button
                  key={f}
                  className={'chip' + (searchFilter === f ? ' active' : '')}
                  onClick={() => setSearchFilter(f)}
                >
                  {f === 'all' ? 'All' : f === 'short' ? 'Short (< 4 min)' : 'Recently uploaded'}
                </button>
              ))}
            </div>
            <div className="search-results">
              {displayVideos.map(v => (
                <SearchResult key={v.id} video={v} onClick={handleVideoClick} />
              ))}
            </div>
          </>
        )}

        {!loading && !error && displayVideos.length > 0 && !isSearchView && (
          <div className="video-grid">
            {displayVideos.map(v => (
              <VideoCard key={v.id} video={v} onClick={handleVideoClick} />
            ))}
          </div>
        )}
      </main>

      {playingVideo && (
        <PlayerOverlay video={playingVideo} onClose={() => setPlayingVideo(null)} />
      )}

      {showPin && !showSettings && (
        <PinPrompt
          correctPin={settings.parentPin}
          onSuccess={() => { setShowPin(false); setShowSettings(true); }}
          onCancel={() => setShowPin(false)}
        />
      )}

      {showSettings && (
        <SettingsModal
          settings={settings}
          onSave={(s) => { setSettings(s); setShowSettings(false); }}
          onCancel={() => setShowSettings(false)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js').catch(() => {});
}
</script>

</body>
</html>
