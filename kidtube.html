<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KidTube</title>
<style>
  :root {
    --bg: #f0f4ff;
    --card: #ffffff;
    --primary: #4f6df5;
    --primary-hover: #3b57d9;
    --accent: #ff6b6b;
    --text: #2d3748;
    --text-light: #718096;
    --border: #e2e8f0;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --green: #48bb78;
    --yellow: #ecc94b;
    --red: #fc8181;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--primary), #7c3aed);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .logo {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .logo svg { width: 32px; height: 32px; }
  .search-box {
    flex: 1;
    max-width: 560px;
    display: flex;
    gap: 0;
  }
  .search-box input {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: var(--radius) 0 0 var(--radius);
    font-size: 15px;
    outline: none;
  }
  .search-box button {
    padding: 10px 20px;
    background: rgba(255,255,255,0.2);
    color: white;
    border: none;
    border-radius: 0 var(--radius) var(--radius) 0;
    cursor: pointer;
    font-size: 15px;
    transition: background 0.2s;
  }
  .search-box button:hover { background: rgba(255,255,255,0.35); }
  .settings-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .settings-btn:hover { background: rgba(255,255,255,0.3); }

  /* ── Setup screen ── */
  .setup-screen {
    max-width: 560px;
    margin: 80px auto;
    padding: 40px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    text-align: center;
  }
  .setup-screen h2 { margin-bottom: 8px; font-size: 24px; }
  .setup-screen p { color: var(--text-light); margin-bottom: 24px; line-height: 1.6; }
  .setup-screen input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    margin-bottom: 16px;
    transition: border 0.2s;
  }
  .setup-screen input:focus { border-color: var(--primary); }
  .setup-screen .btn-primary {
    padding: 12px 32px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .setup-screen .btn-primary:hover { background: var(--primary-hover); }
  .setup-screen .instructions {
    text-align: left;
    background: #f7fafc;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 24px;
    font-size: 14px;
    line-height: 1.8;
  }
  .setup-screen .instructions code {
    background: #edf2f7;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .setup-screen .instructions ol { padding-left: 20px; }

  /* ── Main content ── */
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* ── Video grid ── */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 8px;
  }
  .video-card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .video-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  }
  .video-card .thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
  }
  .video-card .info { padding: 12px 14px; }
  .video-card .title {
    font-weight: 600;
    font-size: 14px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .video-card .channel {
    font-size: 12px;
    color: var(--text-light);
  }
  .video-card .duration-badge {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .video-card .thumb-wrap {
    position: relative;
  }

  /* ── Player overlay ── */
  .player-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .player-container {
    width: 100%;
    max-width: 900px;
    background: black;
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }
  .player-container .close-btn {
    position: absolute;
    top: -44px;
    right: 0;
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    z-index: 10;
  }
  .player-container iframe {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
    display: block;
  }

  /* ── Settings modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 20px;
  }
  .modal {
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px;
    max-width: 540px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h2 {
    font-size: 22px;
    margin-bottom: 4px;
  }
  .modal .subtitle {
    color: var(--text-light);
    font-size: 14px;
    margin-bottom: 24px;
  }
  .modal label {
    display: block;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
    margin-top: 18px;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input[type="text"],
  .modal input[type="number"],
  .modal input[type="password"],
  .modal textarea {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
    font-family: inherit;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--primary); }
  .modal textarea { resize: vertical; min-height: 80px; }
  .modal .hint {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
  }
  .modal .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    justify-content: flex-end;
  }
  .modal .btn-cancel {
    padding: 10px 20px;
    background: transparent;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text);
  }
  .modal .btn-save {
    padding: 10px 24px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .modal .btn-save:hover { background: var(--primary-hover); }

  /* PIN prompt */
  .pin-prompt {
    text-align: center;
  }
  .pin-prompt input {
    max-width: 200px;
    margin: 16px auto;
    text-align: center;
    font-size: 24px;
    letter-spacing: 8px;
  }
  .pin-prompt .error {
    color: var(--accent);
    font-size: 13px;
    margin-top: 8px;
  }

  /* ── Status / messages ── */
  .status-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
    font-size: 16px;
  }
  .status-msg .emoji { font-size: 48px; display: block; margin-bottom: 16px; }

  /* ── Active filters bar ── */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }
  .filter-tag {
    background: #ebf4ff;
    color: var(--primary);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .filter-bar .label {
    font-size: 12px;
    color: var(--text-light);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Suggested topics ── */
  .topics {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 24px;
  }
  .topic-btn {
    padding: 10px 20px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 24px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .topic-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: #ebf4ff;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 10px 14px; gap: 10px; }
    .logo { font-size: 20px; }
    .logo span { display: none; }
    main { padding: 16px; }
    .video-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── Helpers ─── */
const DEFAULT_SETTINGS = {
  apiKey: '',
  parentPin: '1234',
  maxDuration: 10,       // minutes
  blockedKeywords: '',    // comma-separated
  allowedChannels: '',    // comma-separated channel names
  safeSearch: 'strict',   // strict | moderate | none
};

const SUGGESTED_TOPICS = [
  'Dinosaurs', 'Space for kids', 'Lego building', 'Animal facts',
  'Science experiments kids', 'Drawing tutorial kids', 'Funny cats',
  'Magic tricks for kids', 'Nature documentary kids', 'Cartoon music'
];

function loadSettings() {
  try {
    const raw = localStorage.getItem('kidtube_settings');
    return raw ? { ...DEFAULT_SETTINGS, ...JSON.parse(raw) } : { ...DEFAULT_SETTINGS };
  } catch { return { ...DEFAULT_SETTINGS }; }
}
function saveSettings(s) {
  localStorage.setItem('kidtube_settings', JSON.stringify(s));
}

function parseDuration(iso) {
  // PT#H#M#S
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0);
}
function fmtDuration(seconds) {
  const h = Math.floor(seconds/3600);
  const m = Math.floor((seconds%3600)/60);
  const s = seconds % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function getBlockedList(str) {
  return str.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
}

/* ─── YouTube API calls ─── */
async function searchYouTube(apiKey, query, pageToken = '') {
  const params = new URLSearchParams({
    part: 'snippet',
    q: query,
    type: 'video',
    maxResults: '24',
    safeSearch: 'strict',
    key: apiKey,
    ...(pageToken ? { pageToken } : {}),
  });
  const resp = await fetch(`https://www.googleapis.com/youtube/v3/search?${params}`);
  if (!resp.ok) throw new Error(`YouTube search failed (${resp.status})`);
  return resp.json();
}

async function getVideoDetails(apiKey, ids) {
  const params = new URLSearchParams({
    part: 'contentDetails,snippet,statistics',
    id: ids.join(','),
    key: apiKey,
  });
  const resp = await fetch(`https://www.googleapis.com/youtube/v3/videos?${params}`);
  if (!resp.ok) throw new Error(`YouTube details failed (${resp.status})`);
  return resp.json();
}

/* ─── Components ─── */

function Logo() {
  return (
    <div className="logo">
      <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="white" fillOpacity="0.2"/><polygon points="13,9 13,23 24,16" fill="white"/></svg>
      <span>KidTube</span>
    </div>
  );
}

function SetupScreen({ onSave }) {
  const [key, setKey] = useState('');
  const [pin, setPin] = useState('1234');
  return (
    <div className="setup-screen">
      <h2>Welcome to KidTube</h2>
      <p>A safer YouTube experience for your kid. Let's get set up — this only takes a minute.</p>
      <div className="instructions">
        <strong>How to get a free YouTube API key:</strong>
        <ol>
          <li>Go to <a href="https://console.cloud.google.com" target="_blank" rel="noopener">console.cloud.google.com</a></li>
          <li>Create a new project (or pick an existing one)</li>
          <li>Go to <strong>APIs &amp; Services → Library</strong></li>
          <li>Search for <code>YouTube Data API v3</code> and <strong>Enable</strong> it</li>
          <li>Go to <strong>APIs &amp; Services → Credentials</strong></li>
          <li>Click <strong>Create Credentials → API Key</strong></li>
          <li>Copy the key and paste it below</li>
        </ol>
        <p style={{marginTop:'10px'}}>The free tier gives you ~10,000 units/day — plenty for casual use.</p>
        <p style={{marginTop:'10px'}}><strong>Important:</strong> Open this page via a local server, not as a file. The easiest way: open a terminal in the folder with this file and run <code>python3 -m http.server 8080</code>, then visit <code>http://localhost:8080/kidtube.html</code></p>
      </div>
      <input
        type="text"
        placeholder="Paste your YouTube API key here"
        value={key}
        onChange={e => setKey(e.target.value)}
      />
      <label style={{display:'block', textAlign:'left', fontWeight:600, fontSize:14, marginBottom:6}}>
        Parent PIN (to access settings later)
      </label>
      <input
        type="password"
        placeholder="4-digit PIN"
        maxLength={6}
        value={pin}
        onChange={e => setPin(e.target.value)}
        style={{maxWidth:200, margin:'0 auto 16px', textAlign:'center', letterSpacing:6, fontSize:20}}
      />
      <br/>
      <button
        className="btn-primary"
        disabled={!key.trim()}
        onClick={() => {
          const settings = { ...DEFAULT_SETTINGS, apiKey: key.trim(), parentPin: pin || '1234' };
          saveSettings(settings);
          onSave(settings);
        }}
      >
        Get Started
      </button>
    </div>
  );
}

function PinPrompt({ onSuccess, onCancel, correctPin }) {
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal pin-prompt" onClick={e => e.stopPropagation()}>
        <h2>Parent Access</h2>
        <p style={{color:'var(--text-light)', marginTop:4}}>Enter your PIN to open settings</p>
        <input
          type="password"
          maxLength={6}
          value={pin}
          autoFocus
          onChange={e => { setPin(e.target.value); setError(''); }}
          onKeyDown={e => {
            if (e.key === 'Enter') {
              if (pin === correctPin) onSuccess();
              else setError('Wrong PIN, try again');
            }
          }}
        />
        {error && <div className="error">{error}</div>}
        <div className="btn-row" style={{justifyContent:'center'}}>
          <button className="btn-cancel" onClick={onCancel}>Cancel</button>
          <button className="btn-save" onClick={() => {
            if (pin === correctPin) onSuccess();
            else setError('Wrong PIN, try again');
          }}>Unlock</button>
        </div>
      </div>
    </div>
  );
}

function SettingsModal({ settings, onSave, onCancel }) {
  const [s, setS] = useState({ ...settings });
  const upd = (k, v) => setS(prev => ({ ...prev, [k]: v }));
  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h2>Parent Settings</h2>
        <div className="subtitle">Control what your kid can see</div>

        <label>Max Video Duration (minutes)</label>
        <input type="number" min={1} max={120} value={s.maxDuration}
          onChange={e => upd('maxDuration', parseInt(e.target.value) || 1)} />
        <div className="hint">Videos longer than this will be hidden. Currently {s.maxDuration} min.</div>

        <label>Blocked Keywords</label>
        <textarea value={s.blockedKeywords}
          onChange={e => upd('blockedKeywords', e.target.value)}
          placeholder="e.g. prank, unboxing, scary, horror, gun, violence" />
        <div className="hint">Comma-separated. Videos whose title or description contain these words will be filtered out.</div>

        <label>Allowed Channels (optional)</label>
        <textarea value={s.allowedChannels}
          onChange={e => upd('allowedChannels', e.target.value)}
          placeholder="e.g. Cocomelon, National Geographic Kids, SciShow Kids" />
        <div className="hint">Comma-separated. If set, ONLY videos from these channels will appear. Leave empty to allow all channels.</div>

        <label>Safe Search</label>
        <select value={s.safeSearch} onChange={e => upd('safeSearch', e.target.value)}
          style={{width:'100%',padding:'10px 14px',border:'2px solid var(--border)',borderRadius:8,fontSize:14}}>
          <option value="strict">Strict (recommended)</option>
          <option value="moderate">Moderate</option>
          <option value="none">None</option>
        </select>

        <label>YouTube API Key</label>
        <input type="text" value={s.apiKey} onChange={e => upd('apiKey', e.target.value)} />

        <label>Parent PIN</label>
        <input type="password" value={s.parentPin} onChange={e => upd('parentPin', e.target.value)}
          style={{maxWidth:200, letterSpacing:6}} maxLength={6} />

        <div className="btn-row">
          <button className="btn-cancel" onClick={onCancel}>Cancel</button>
          <button className="btn-save" onClick={() => { saveSettings(s); onSave(s); }}>Save Settings</button>
        </div>
      </div>
    </div>
  );
}

function VideoCard({ video, onClick }) {
  return (
    <div className="video-card" onClick={() => onClick(video.id)}>
      <div className="thumb-wrap">
        <img className="thumb"
          src={video.snippet.thumbnails.medium?.url || video.snippet.thumbnails.default?.url}
          alt={video.snippet.title}
          loading="lazy" />
        {video.durationSec != null && (
          <div className="duration-badge">{fmtDuration(video.durationSec)}</div>
        )}
      </div>
      <div className="info">
        <div className="title" dangerouslySetInnerHTML={{ __html: video.snippet.title }} />
        <div className="channel">{video.snippet.channelTitle}</div>
      </div>
    </div>
  );
}

function PlayerOverlay({ videoId, onClose }) {
  const playerRef = useRef(null);
  const containerRef = useRef(null);
  const [playerError, setPlayerError] = useState(null);

  useEffect(() => {
    setPlayerError(null);

    // Load the IFrame API if not already loaded
    if (!window.YT) {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }

    function createPlayer() {
      if (playerRef.current) {
        try { playerRef.current.destroy(); } catch {}
      }
      playerRef.current = new window.YT.Player('yt-player-target', {
        videoId,
        width: '100%',
        height: '100%',
        playerVars: {
          autoplay: 1,
          rel: 0,
          modestbranding: 1,
          origin: window.location.origin,
        },
        events: {
          onError: (event) => {
            // 2=invalid id, 5=HTML5 error, 100=not found, 101/150=embed disallowed
            const code = event.data;
            if (code === 101 || code === 150) {
              setPlayerError('embed');
            } else if (code === 100) {
              setPlayerError('notfound');
            } else {
              setPlayerError('generic');
            }
          },
        },
      });
    }

    if (window.YT && window.YT.Player) {
      createPlayer();
    } else {
      window.onYouTubeIframeAPIReady = createPlayer;
    }

    return () => {
      if (playerRef.current) {
        try { playerRef.current.destroy(); } catch {}
        playerRef.current = null;
      }
    };
  }, [videoId]);

  const ytLink = `https://www.youtube.com/watch?v=${videoId}`;

  return (
    <div className="player-overlay" onClick={onClose}>
      <div className="player-container" onClick={e => e.stopPropagation()}>
        <button className="close-btn" onClick={onClose}>✕</button>
        {playerError ? (
          <div style={{
            aspectRatio:'16/9', display:'flex', flexDirection:'column',
            alignItems:'center', justifyContent:'center', background:'#1a1a2e',
            color:'white', padding:'20px', textAlign:'center', gap:'16px',
            borderRadius:'var(--radius)'
          }}>
            <div style={{fontSize:'36px'}}>
              {playerError === 'embed' ? '🔒' : playerError === 'notfound' ? '🔍' : '⚠️'}
            </div>
            <div style={{fontSize:'16px', maxWidth:'400px', lineHeight:'1.5'}}>
              {playerError === 'embed'
                ? "This video doesn't allow embedded playback."
                : playerError === 'notfound'
                ? "This video wasn't found or has been removed."
                : "Something went wrong loading this video."}
            </div>
            {playerError === 'embed' && (
              <a href={ytLink} target="_blank" rel="noopener noreferrer"
                style={{
                  padding:'10px 24px', background:'#ff0000', color:'white',
                  borderRadius:'8px', textDecoration:'none', fontWeight:600, fontSize:'14px'
                }}>
                Watch on YouTube.com
              </a>
            )}
          </div>
        ) : (
          <div id="yt-player-target" style={{width:'100%', aspectRatio:'16/9'}} />
        )}
      </div>
    </div>
  );
}

function FilterBar({ settings }) {
  const tags = [];
  tags.push(`Max ${settings.maxDuration} min`);
  if (settings.safeSearch === 'strict') tags.push('SafeSearch: strict');
  const blocked = getBlockedList(settings.blockedKeywords);
  if (blocked.length) tags.push(`${blocked.length} blocked keyword${blocked.length>1?'s':''}`);
  const allowed = getBlockedList(settings.allowedChannels);
  if (allowed.length) tags.push(`${allowed.length} allowed channel${allowed.length>1?'s':''}`);
  return (
    <div className="filter-bar">
      <span className="label">Active filters:</span>
      {tags.map((t,i) => <span key={i} className="filter-tag">{t}</span>)}
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [settings, setSettings] = useState(loadSettings);
  const [query, setQuery] = useState('');
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [playingId, setPlayingId] = useState(null);
  const [showPin, setShowPin] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [hasSearched, setHasSearched] = useState(false);
  const inputRef = useRef();

  const isSetup = Boolean(settings.apiKey);

  /* ── Filter logic ── */
  function filterVideos(items) {
    const maxSec = settings.maxDuration * 60;
    const blocked = getBlockedList(settings.blockedKeywords);
    const allowed = getBlockedList(settings.allowedChannels);

    return items.filter(v => {
      // Duration filter
      if (v.durationSec > maxSec) return false;
      // Blocked keywords
      const text = (v.snippet.title + ' ' + (v.snippet.description || '')).toLowerCase();
      if (blocked.some(kw => text.includes(kw))) return false;
      // Allowed channels
      if (allowed.length > 0) {
        const ch = v.snippet.channelTitle.toLowerCase();
        if (!allowed.some(a => ch.includes(a) || a.includes(ch))) return false;
      }
      return true;
    });
  }

  /* ── Search ── */
  const doSearch = useCallback(async (q) => {
    if (!q.trim() || !settings.apiKey) return;
    setLoading(true);
    setError('');
    setHasSearched(true);
    try {
      const searchResp = await searchYouTube(settings.apiKey, q + ' for kids');
      const ids = searchResp.items.map(i => i.id.videoId).filter(Boolean);
      if (!ids.length) { setVideos([]); setLoading(false); return; }
      const detailResp = await getVideoDetails(settings.apiKey, ids);
      const enriched = detailResp.items.map(item => ({
        ...item,
        durationSec: parseDuration(item.contentDetails.duration),
      }));
      setVideos(filterVideos(enriched));
    } catch (err) {
      setError(err.message || 'Something went wrong');
    }
    setLoading(false);
  }, [settings]);

  const handleSearch = (e) => {
    e?.preventDefault();
    doSearch(query);
  };

  /* ── Keyboard: close player on Escape ── */
  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'Escape') {
        if (playingId) setPlayingId(null);
        else if (showSettings) setShowSettings(false);
        else if (showPin) setShowPin(false);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [playingId, showSettings, showPin]);

  /* ── Not set up yet ── */
  if (!isSetup) {
    return <SetupScreen onSave={(s) => setSettings(s)} />;
  }

  return (
    <>
      <header>
        <Logo />
        <form className="search-box" onSubmit={handleSearch}>
          <input
            ref={inputRef}
            type="text"
            placeholder="What do you want to watch?"
            value={query}
            onChange={e => setQuery(e.target.value)}
          />
          <button type="submit">Search</button>
        </form>
        <button className="settings-btn" title="Parent Settings" onClick={() => setShowPin(true)}>
          ⚙
        </button>
      </header>

      <main>
        <FilterBar settings={settings} />

        {!hasSearched && !loading && (
          <div className="status-msg">
            <span className="emoji">🎬</span>
            Search for something fun to watch!
            <div className="topics">
              {SUGGESTED_TOPICS.map(t => (
                <button key={t} className="topic-btn" onClick={() => { setQuery(t); doSearch(t); }}>
                  {t}
                </button>
              ))}
            </div>
          </div>
        )}

        {loading && <div className="status-msg"><span className="emoji">⏳</span>Finding great videos...</div>}

        {error && <div className="status-msg" style={{color:'var(--accent)'}}><span className="emoji">😕</span>{error}</div>}

        {hasSearched && !loading && !error && videos.length === 0 && (
          <div className="status-msg"><span className="emoji">🔍</span>No videos passed the filters. Try a different search!</div>
        )}

        <div className="video-grid">
          {videos.map(v => (
            <VideoCard key={v.id} video={v} onClick={setPlayingId} />
          ))}
        </div>
      </main>

      {playingId && <PlayerOverlay videoId={playingId} onClose={() => setPlayingId(null)} />}

      {showPin && !showSettings && (
        <PinPrompt
          correctPin={settings.parentPin}
          onSuccess={() => { setShowPin(false); setShowSettings(true); }}
          onCancel={() => setShowPin(false)}
        />
      )}

      {showSettings && (
        <SettingsModal
          settings={settings}
          onSave={(s) => { setSettings(s); setShowSettings(false); }}
          onCancel={() => setShowSettings(false)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>

</body>
</html>
